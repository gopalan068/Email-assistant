services:
  - type: web
    name: mail-assist-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT backend.api_server:app
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: GMAIL_TOKEN_JSON
        sync: false
      - key: GMAIL_CREDENTIALS_JSON
        sync: false
      - key: RENDER
        value: "true"
